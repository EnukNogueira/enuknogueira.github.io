<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;">
  <defs>
    <radialGradient id="planet1" cx="35%" cy="30%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1a0000;stop-opacity:0.3" />
    </radialGradient>
    <radialGradient id="planet2" cx="70%" cy="70%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#001a1a;stop-opacity:0.2" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fundo espacial gradiente -->
  <rect width="1920" height="1080" style="fill: url(#spaceGradient)"/>
  <rect width="1920" height="1080" style="fill: linear-gradient(135deg, #000204 0%, #0a0e27 30%, #001a4d 60%, #000204 100%)"/>
  
  <!-- Nebulosa roxa ao fundo -->
  <ellipse cx="300" cy="200" rx="400" ry="300" style="fill: rgba(210, 155, 222, 0.08); filter: blur(80px)"/>
  
  <!-- Nebulosa azul ao fundo -->
  <ellipse cx="1600" cy="800" rx="500" ry="400" style="fill: rgba(0, 255, 255, 0.06); filter: blur(100px)"/>
  
  <!-- Planeta 1 (Marte) -->
  <circle cx="200" cy="250" r="120" style="fill: url(#planet1)"/>
  <circle cx="200" cy="250" r="120" style="fill: rgba(255, 0, 0, 0.1); filter: url(#glow)"/>
  
  <!-- Planeta 2 (Oceano) -->
  <circle cx="1700" cy="800" r="150" style="fill: url(#planet2)"/>
  <circle cx="1700" cy="800" r="150" style="fill: rgba(0, 255, 255, 0.15); filter: url(#glow)"/>
  
  <!-- Estações/Estruturas -->
  <g transform="translate(1200, 600)">
    <!-- Torre de transmissão estilo NASA -->
    <line x1="0" y1="0" x2="0" y2="-80" style="stroke: rgba(0, 255, 136, 0.5); stroke-width: 2; filter: url(#glow)"/>
    <circle cx="0" cy="-80" r="8" style="fill: rgba(0, 255, 136, 0.6)"/>
    <!-- Painéis solares -->
    <rect x="-30" y="-70" width="20" height="40" style="fill: rgba(0, 255, 200, 0.4); stroke: rgba(0, 255, 136, 0.5); stroke-width: 0.5; transform: rotate(-20deg)"/>
    <rect x="10" y="-70" width="20" height="40" style="fill: rgba(0, 255, 200, 0.4); stroke: rgba(0, 255, 136, 0.5); stroke-width: 0.5; transform: rotate(20deg)"/>
  </g>
  
  <!-- Estrelas de fundo (espalhadas) -->
  <circle cx="150" cy="100" r="1" style="fill: rgba(255, 255, 255, 0.8)"/>
  <circle cx="450" cy="80" r="1.5" style="fill: rgba(255, 255, 255, 0.9)"/>
  <circle cx="900" cy="150" r="0.8" style="fill: rgba(255, 255, 255, 0.7)"/>
  <circle cx="1100" cy="200" r="1.2" style="fill: rgba(255, 255, 255, 0.85)"/>
  <circle cx="1400" cy="100" r="1" style="fill: rgba(255, 255, 255, 0.8)"/>
  <circle cx="1800" cy="250" r="0.9" style="fill: rgba(255, 255, 255, 0.75)"/>
  <circle cx="300" cy="900" r="1.3" style="fill: rgba(255, 255, 255, 0.8)"/>
  <circle cx="800" cy="950" r="1" style="fill: rgba(255, 255, 255, 0.7)"/>
  <circle cx="1300" cy="1000" r="1.1" style="fill: rgba(255, 255, 255, 0.85)"/>
  <circle cx="1700" cy="950" r="0.9" style="fill: rgba(255, 255, 255, 0.75)"/>
  
  <!-- Asteroides flutuando -->
  <g transform="translate(500, 700)">
    <polygon points="0,-10 8,-2 5,8 -5,8 -8,-2" style="fill: rgba(120, 80, 40, 0.6); stroke: rgba(150, 100, 50, 0.5); stroke-width: 0.5"/>
  </g>
  
  <g transform="translate(1400, 500)">
    <polygon points="0,-8 6,-1 4,6 -4,6 -6,-1" style="fill: rgba(120, 80, 40, 0.5); stroke: rgba(150, 100, 50, 0.4); stroke-width: 0.5"/>
  </g>
  
  <!-- Órbita tracejada -->
  <circle cx="200" cy="250" r="180" style="fill: none; stroke: rgba(0, 255, 136, 0.15); stroke-width: 1; stroke-dasharray: 5,5"/>
  
  <!-- Trilho de nave (efeito de movimento) -->
  <line x1="350" y1="150" x2="450" y2="150" style="stroke: rgba(0, 255, 136, 0.3); stroke-width: 1; filter: url(#glow)"/>
</svg>
